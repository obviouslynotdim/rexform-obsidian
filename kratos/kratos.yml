version: v1.2.0

# DSN is injected at runtime via the DSN environment variable.
# Kratos reads DSN directly without YAML substitution.
dsn: memory

serve:
  public:
    base_url: https://rexform-kratos-production.up.railway.app
    cors:
      enabled: true
      allowed_origins:
        - https://rexform-notes-production.up.railway.app
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Session-Token
        - X-CSRF-Token
      exposed_headers:
        - Content-Type
  admin:
    base_url: http://0.0.0.0:4434

selfservice:
  default_browser_return_url: https://rexform-notes-production.up.railway.app
  allowed_return_urls:
    - https://rexform-notes-production.up.railway.app
    - http://localhost:3000

  methods:
    password:
      enabled: true
      config:
        min_password_length: 8

  flows:
    login:
      ui_url: https://rexform-notes-production.up.railway.app/login
      lifespan: 10m

    registration:
      ui_url: https://rexform-notes-production.up.railway.app/register
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: web_hook
              config:
                url: https://rexform-notes-production.up.railway.app/api/hooks/kratos/after-register
                method: POST
                body: base64://eyAiaWRlbnRpdHkiOiB7ICJpZCI6IHt7IC5JZGVudGl0eS5JZCB9fSwgInRyYWl0cyI6IHt7IHRvanNvbiAuSWRlbnRpdHkuVHJhaXRzIH19IH0gfQ==

    verification:
      use: code
      ui_url: https://rexform-notes-production.up.railway.app/verification
      enabled: true
      lifespan: 15m

    recovery:
      use: code
      ui_url: https://rexform-notes-production.up.railway.app/recovery
      enabled: true
      lifespan: 15m

    logout:
      after:
        default_browser_return_url: https://rexform-notes-production.up.railway.app/login

    settings:
      ui_url: https://rexform-notes-production.up.railway.app/settings

log:
  level: info
  format: text
  leak_sensitive_values: false

identity:
  default_schema_id: user
  schemas:
    - id: user
      url: file:///etc/config/kratos/identity-schemas/user.schema.json

courier:
  smtp:
    connection_uri: smtp://test:test@localhost:1025/?disable_starttls=true
    from_address: noreply@rexform.io
    from_name: REXFORM Notes
